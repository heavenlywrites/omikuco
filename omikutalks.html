<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>omiku talks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600&family=Lilita+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f10;
      --surface:   #1a1a1c;
      --surface2:  #222224;
      --border:    #2e2e32;
      --purple:    #7a7585;
      --pink:      #d4a8c7;
      --pink-dim:  rgba(212,168,199,0.12);
      --teal:      #7bbdb5;
      --text:      #f0eaed;
      --text-soft: #8a8490;
      --font:      'Nunito', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-wrap {
      position: relative;
      width: min(300px, 82vw);
      margin: 44px auto 20px;
      background: var(--bg);
    }

    .logo-inner {
      border-radius: 14px;
      box-shadow: 0 0 18px rgba(212,168,199,0.45), 0 0 48px rgba(212,168,199,0.15);
      overflow: hidden;
    }

    .logo-wrap img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
    }

    /* FORM CARD */
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin: 0 20px 16px;
    }

    .cats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .cat-btn {
      padding: 7px 16px;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: transparent;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-soft);
      cursor: pointer;
      transition: all 0.15s;
    }

    .cat-btn:hover { border-color: var(--purple); color: var(--text); }

    .cat-btn.active {
      background: var(--pink-dim);
      border-color: var(--pink);
      color: var(--pink);
      font-weight: 600;
    }

    .field-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-soft);
      margin-bottom: 8px;
      display: block;
    }

    .field-hint {
      font-size: 12px;
      font-weight: 400;
      color: var(--purple);
      margin-left: 6px;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      padding: 13px 15px;
      font-family: var(--font);
      font-size: 15px;
      color: var(--text);
      resize: vertical;
      outline: none;
      transition: border-color 0.15s;
    }

    textarea:focus { border-color: var(--purple); }
    textarea::placeholder { color: #3a3a3e; }

    .char { font-size: 12px; color: var(--text-soft); text-align: right; margin-top: 5px; }

    .submit-btn {
      margin-top: 18px;
      width: 100%;
      padding: 13px;
      background: var(--pink);
      color: #0f0f10;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .submit-btn:hover { opacity: 0.85; }

    .success {
      display: none;
      text-align: center;
      padding: 14px 0 2px;
      color: var(--pink);
      font-size: 14px;
      font-weight: 500;
    }

    footer { margin-top: auto; padding: 24px 0 36px; font-size: 13px; color: var(--text-soft); }

    .admin-btn {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-soft);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      font-family: var(--font);
      letter-spacing: 0.04em;
      transition: all 0.15s;
      margin-left: auto;
    }

    .admin-btn:hover { border-color: var(--purple); color: var(--text); }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(6px);
      z-index: 100;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      width: 100%;
      max-width: 460px;
      border: 1px solid var(--border);
      overflow: hidden;
      animation: up 0.2s ease;
    }

    @keyframes up {
      from { transform: translateY(10px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 22px 18px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 16px;
      color: var(--pink);
    }

    .modal-close { background: none; border: none; font-size: 18px; color: var(--text-soft); cursor: pointer; line-height: 1; }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 22px; }
    .pw-row { display: flex; gap: 8px; margin-bottom: 8px; }

    .pw-input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 13px;
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.15s;
    }

    .pw-input:focus { border-color: var(--purple); }
    .pw-input.err  { border-color: #a05070; }

    .pw-go {
      padding: 10px 16px;
      background: var(--pink);
      color: #0f0f10;
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .pw-err { font-size: 13px; color: #c07090; display: none; }
    .dash   { display: none; }

    .dash-top { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
    .dash-num { font-size: 44px; font-weight: 300; line-height: 1; color: var(--pink); }
    .dash-lbl { font-size: 13px; color: var(--text-soft); font-weight: 500; }
    .dash-acts { display: flex; gap: 7px; margin-bottom: 18px; flex-wrap: wrap; }

    .act-btn {
      padding: 7px 13px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      background: transparent;
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-soft);
      cursor: pointer;
      transition: all 0.15s;
    }

    .act-btn:hover { border-color: var(--purple); color: var(--text); }
    .act-btn.danger { color: #a05070; border-color: #3a2030; }
    .act-btn.danger:hover { border-color: #a05070; color: #c07090; }

    .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 16px; }

    .tab {
      padding: 7px 12px;
      font-size: 13px;
      font-family: var(--font);
      font-weight: 500;
      background: none;
      border: none;
      color: var(--text-soft);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all 0.15s;
    }

    .tab.active { color: var(--pink); border-bottom-color: var(--pink); }

    .sub-list { max-height: 320px; overflow-y: auto; }

    .sub-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px;
      margin-bottom: 8px;
      position: relative;
      background: var(--surface2);
    }

    .sub-meta { display: flex; gap: 7px; align-items: center; margin-bottom: 7px; }

    .sub-tag {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 7px;
      border-radius: 4px;
      background: var(--pink-dim);
      color: var(--pink);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .sub-date { font-size: 11px; color: var(--text-soft); }
    .sub-text { font-size: 14px; line-height: 1.5; color: var(--text); }

    .sub-del {
      position: absolute;
      top: 9px; right: 11px;
      background: none;
      border: none;
      font-size: 15px;
      color: #333336;
      cursor: pointer;
      transition: color 0.15s;
    }

    .sub-del:hover { color: #a05070; }

    .card { text-align: center; }
    .cats { justify-content: center; }
    .socials-card { text-align: center; }

    .sub-done {
      position: absolute;
      top: 9px; right: 36px;
      background: none;
      border: none;
      font-size: 15px;
      color: #333336;
      cursor: pointer;
      transition: color 0.15s;
    }

    .sub-done:hover { color: var(--purple); }

    .sub-item.done {
      opacity: 0.45;
    }

    .sub-item.done .sub-done { color: var(--pink); opacity: 1; }
    .sub-item.done .sub-text { text-decoration: line-through; }
    .topbar {
      width: 100%;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .topbar-logo {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-soft);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }

    .topbar-logo:hover { color: var(--pink); }



    /* SOCIALS */
    .socials-card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 22px;
      margin: 20px 20px 16px;
    }

    .socials-title {
      font-size: 22px;
      font-family: 'Lilita One', cursive;
      color: var(--text);
      text-transform: uppercase;
      margin-bottom: 14px;
      padding: 10px 0;
    }

    .socials {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-soft);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.15s;
    }

    .social-btn:hover {
      border-color: var(--pink);
      color: var(--pink);
    }
  </style>
</head>

        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
        discord
      </a>
    </div>
  </div>

  <div class="card">
    <div style="font-size:22px;font-family:'Lilita One',cursive;color:var(--text);margin-bottom:20px;">TALK TO ME ♡</div>
    <div class="cats">
      <button class="cat-btn active" data-cat="question" onclick="setCat(this)">question</button>
      <button class="cat-btn" data-cat="advice" onclick="setCat(this)">advice</button>
      <button class="cat-btn" data-cat="episode idea" onclick="setCat(this)">episode idea</button>
    </div>

    <div style="font-size:12px;color:var(--purple);margin-bottom:8px;" id="fieldHint">Have any questions? Ask me anything and I will answer honestly on my podcast.</div>
    <textarea id="msg" placeholder="type here…" maxlength="500" oninput="updateChar()"></textarea>
    <div class="char"><span id="charNum">0</span> / 500</div>

    <button class="submit-btn" onclick="submit()">send</button>
    <div class="success" id="success">✿ got it — thank you!</div>
  </div>

  <footer><a href="https://omiku.co" style="color:var(--text-soft);text-decoration:none;transition:color 0.15s;" onmouseover="this.style.color='var(--pink)'" onmouseout="this.style.color='var(--text-soft)'">omiku.co</a></footer>

  <div class="overlay" id="modal">
    <div class="modal">
      <div class="modal-hd">
        <span>✿ admin</span>
        <button class="modal-close" onclick="closeAdmin()">✕</button>
      </div>
      <div class="modal-body">
        <div id="loginView">
          <div class="pw-row">
            <input type="password" class="pw-input" id="pw" placeholder="password" onkeydown="if(event.key==='Enter')checkPw()" />
            <button class="pw-go" onclick="checkPw()">unlock</button>
          </div>
          <div class="pw-err" id="pwErr">incorrect password</div>
        </div>
        <div class="dash" id="dashView">
          <div class="dash-top">
            <div class="dash-num" id="total">0</div>
            <div>
              <div style="font-weight:600;font-size:14px;">submissions</div>
              <div class="dash-lbl">across all categories</div>
            </div>
          </div>
          <div class="dash-acts">
            <button class="act-btn" onclick="copyAll()">copy all</button>
            <button class="act-btn" onclick="exportCSV()">export .csv</button>
            <button class="act-btn danger" onclick="clearAll()">clear all</button>
          </div>
          <div class="tabs">
            <button class="tab active" data-f="all" onclick="setFilter(this)">all</button>
            <button class="tab" data-f="question" onclick="setFilter(this)">questions</button>
            <button class="tab" data-f="advice" onclick="setFilter(this)">advice</button>
            <button class="tab" data-f="episode idea" onclick="setFilter(this)">episode ideas</button>
          </div>
          <div class="sub-list" id="subList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const PASS = 'omiku';
    const hints = {
      question:       'Have any questions? Ask me anything and I will answer honestly on my podcast.',
      advice:         "Need any advice? Tell me what's up and I'll talk about it on my podcast.",
      'episode idea': 'Got an episode idea? Describe it all here and I will look into making it happen.'
    };
    let cat = 'question', filter = 'all';
    let subs = JSON.parse(localStorage.getItem('omikutalks') || '[]');

    function setCat(btn) {
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      cat = btn.dataset.cat;
      document.getElementById('fieldHint').textContent = hints[cat];
    }

    function updateChar() {
      document.getElementById('charNum').textContent = document.getElementById('msg').value.length;
    }

    function submit() {
      const text = document.getElementById('msg').value.trim();
      if (!text) return;
      subs.push({ id: Date.now(), cat, text, date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) });
      save();
      document.getElementById('msg').value = '';
      document.getElementById('charNum').textContent = '0';
      const s = document.getElementById('success');
      s.style.display = 'block';
      setTimeout(() => s.style.display = 'none', 3000);
    }

    function openAdmin() { document.getElementById('modal').classList.add('open'); document.getElementById('pw').focus(); }
    function closeAdmin() { document.getElementById('modal').classList.remove('open'); }

    function checkPw() {
      const val = document.getElementById('pw').value, input = document.getElementById('pw');
      if (val === PASS) {
        document.getElementById('loginView').style.display = 'none';
        document.getElementById('dashView').style.display = 'block';
        renderDash();
      } else {
        input.classList.add('err');
        document.getElementById('pwErr').style.display = 'block';
        setTimeout(() => { input.classList.remove('err'); document.getElementById('pwErr').style.display = 'none'; }, 2000);
      }
    }

    function setFilter(btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active'); filter = btn.dataset.f; renderDash();
    }

    function renderDash() {
      const filtered = filter === 'all' ? subs : subs.filter(s => s.cat === filter);
      document.getElementById('total').textContent = subs.length;
      const list = document.getElementById('subList');
      if (!filtered.length) { list.innerHTML = '<div class="empty">no submissions yet ✿</div>'; return; }
      list.innerHTML = filtered.slice().reverse().map(s => `
        <div class="sub-item${s.done ? ' done' : ''}" id="sub-${s.id}">
          <div class="sub-meta"><span class="sub-tag">${s.cat}</span><span class="sub-date">${s.date}</span></div>
          <div class="sub-text">${esc(s.text)}</div>
          <button class="sub-done" onclick="toggleDone(${s.id})" title="${s.done ? 'mark unanswered' : 'mark answered'}">✓</button>
          <button class="sub-del" onclick="del(${s.id})" title="delete">✕</button>
        </div>
      `).join('');
    }

    function del(id) { subs = subs.filter(s => s.id !== id); save(); renderDash(); }
    function toggleDone(id) {
      subs = subs.map(s => s.id === id ? { ...s, done: !s.done } : s);
      save(); renderDash();
    }
    function clearAll() { if (!confirm('Delete everything?')) return; subs = []; save(); renderDash(); }
    function copyAll() { navigator.clipboard.writeText(subs.map(s => `[${s.cat}] ${s.date}\n${s.text}`).join('\n\n---\n\n') || 'No submissions.'); }
    function exportCSV() {
      const rows = [['date','category','message'], ...subs.map(s => [s.date, s.cat, '"' + s.text.replace(/"/g,'""') + '"'])];
      const a = document.createElement('a');
      a.href = 'data:text/csv,' + encodeURIComponent(rows.map(r => r.join(',')).join('\n'));
      a.download = 'omikutalks.csv'; a.click();
    }
    function save() { localStorage.setItem('omikutalks', JSON.stringify(subs)); }
    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeAdmin(); });
  </script>
</body>
</html>
