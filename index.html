<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>omiku ✿</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Hachi+Maru+Pop&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #0e0e0f;
    --bg2:    #161618;
    --bg3:    #1e1e21;
    --border: rgba(255,255,255,0.07);
    --text:   #f0eef5;
    --muted:  #7a7585;
    --accent: #d4a8c7;
    --accent2:#a98fc7;
    --pink:   #e8b4cc;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* subtle noise texture */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; opacity: 0.6;
  }

  /* ambient glow shapes */
  .glow {
    position: fixed; border-radius: 50%; pointer-events: none; filter: blur(80px); opacity: 0.12;
  }
  .glow-1 { width: 400px; height: 400px; background: #d4a8c7; top: -100px; left: -100px; animation: drift1 14s ease-in-out infinite; }
  .glow-2 { width: 300px; height: 300px; background: #a98fc7; bottom: -80px; right: -60px; animation: drift2 17s ease-in-out infinite; }
  .glow-3 { width: 200px; height: 200px; background: #d4a8c7; top: 45%; right: -60px; animation: drift1 11s ease-in-out infinite reverse; }

  @keyframes drift1 {
    0%, 100% { transform: translate(0, 0); }
    50%       { transform: translate(20px, -25px); }
  }
  @keyframes drift2 {
    0%, 100% { transform: translate(0, 0); }
    50%       { transform: translate(-18px, 18px); }
  }

  /* cherry blossom canvas */
  #blossoms { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

  /* card */
  .card {
    position: relative; z-index: 1;
    text-align: center;
    padding: 44px 40px 40px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 14px;
    max-width: 340px; width: 90vw;
    box-shadow: 0 24px 60px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.04
