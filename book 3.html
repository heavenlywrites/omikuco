<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>book with omiku ✿</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:#faf9f7; --surface:#ffffff; --text:#1a1a1a; --muted:#666; --text-soft:#aaa;
  --border:rgba(0,0,0,0.1);
  --accent:#f0a8c7; --accent-bg:#fdf0f5; --accent-dark:#c0547a;
  --mint:#C9F5F0; --mint-dk:#3BBFAA;
  --radius:8px; --radius-lg:14px;
}

body{min-height:100vh;background:var(--bg);font-family:'DM Sans',sans-serif;overflow-x:hidden;color:var(--text);font-size:14px}

/* Nav */
.sitenav{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2rem;border-bottom:1px solid var(--border);background:var(--surface)}
.nav-logo{font-size:15px;font-weight:500;color:var(--text);text-decoration:none;letter-spacing:-.01em}
.nav-logo .sym{color:var(--accent);margin-left:3px}
.nav-right{font-size:12px;color:var(--text-soft)}

@keyframes popIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* Layout */
.page{position:relative;z-index:1;min-height:calc(100vh - 90px);display:flex;flex-direction:column;align-items:center;padding:36px 20px 80px}
.header{display:none} /* Used for secret logo taps */

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);width:100%;max-width:680px;overflow:hidden;animation:popIn .4s ease both}

/* Steps */
.steps{display:flex;align-items:center;gap:6px;padding:14px 20px;background:var(--bg);border-bottom:1px solid var(--border)}
.step{display:flex;align-items:center;gap:7px;flex:1;font-size:12px;font-weight:400;color:var(--text-soft);transition:color .3s}
.step.active{color:var(--text);font-weight:500}
.step.done{color:var(--accent-dark)}
.step-num{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text-soft);font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s}
.step.active .step-num{background:var(--text);color:white;border-color:var(--text)}
.step.done .step-num{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-dark)}
.step-arrow{color:var(--text-soft);font-size:10px;flex-shrink:0}

/* Content */
.content{padding:28px}
.slabel{font-size:11px;font-weight:500;color:var(--text-soft);letter-spacing:.04em;margin-bottom:14px}

/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-month{font-size:15px;font-weight:400;color:var(--text);letter-spacing:-.01em}
.cal-arr{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .2s}
.cal-arr:hover{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-dark)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dname{text-align:center;font-size:.58rem;font-weight:500;color:var(--text-soft);letter-spacing:.06em;text-transform:uppercase;padding:6px 0}
.day{aspect-ratio:1;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .15s;position:relative}
.day:hover:not(.empty):not(.past):not(.bday){background:var(--accent-bg);color:var(--accent-dark)}
.day.empty{cursor:default}
.day.past{color:#ccc;cursor:not-allowed}
.day.today{font-weight:700}
.day.today::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--accent-dark)}
.day.selected{background:var(--text);color:white;font-weight:500}
.day.bday{color:#ccc;cursor:not-allowed;text-decoration:line-through;font-size:.7rem}

/* Time slots */
.tgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.slot{padding:10px 4px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);text-align:center;font-size:12px;font-weight:400;color:var(--muted);cursor:pointer;transition:all .15s;line-height:1.4}
.slot:hover:not(.taken):not(.bslot){background:var(--accent-bg);border-color:var(--accent);color:var(--accent-dark)}
.slot.selected{background:var(--text);border-color:var(--text);color:white;font-weight:500}
.slot.taken,.slot.bslot{background:var(--bg);border-color:var(--border);color:#ccc;cursor:not-allowed;font-size:.62rem}

/* Booking pill */
.pill{display:flex;align-items:center;gap:14px;background:var(--accent-bg);border:1px solid rgba(240,168,199,0.35);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:20px}
.pill-ico{font-size:1.4rem;flex-shrink:0}
.pill-date{font-size:14px;font-weight:500;color:var(--text)}
.pill-time{font-size:12px;color:var(--muted);margin-top:2px;font-weight:300}

/* Form */
.frow{margin-bottom:14px}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{display:block;font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.01em;margin-bottom:6px;text-transform:none}
input,textarea,select{width:100%;padding:10px 13px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;font-weight:300}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(240,168,199,0.18)}
textarea{resize:none}
::placeholder{color:var(--text-soft);font-weight:300}

/* Buttons */
.btn-primary{width:100%;padding:11px 22px;border-radius:40px;border:1px solid var(--text);background:var(--text);color:white;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:.01em;cursor:pointer;transition:all .18s}
.btn-primary:hover{background:#333;border-color:#333}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{padding:10px 20px;border-radius:40px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;cursor:pointer;transition:all .18s}
.btn-ghost:hover{background:var(--bg)}
.btn-sm{padding:8px 16px;border-radius:40px;border:1px solid var(--text);background:var(--text);color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-danger{padding:4px 10px;border-radius:var(--radius);border:1px solid var(--accent);background:var(--accent-bg);color:var(--accent-dark);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}

.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:22px;padding-top:18px;border-top:1px solid var(--border)}

/* Error & Success */
.err{display:none;margin-top:8px;padding:10px 14px;background:var(--accent-bg);border:1px solid var(--accent);border-radius:var(--radius);font-size:12px;color:var(--accent-dark)}
.success-wrap{text-align:center;padding:36px 16px}
.success-bounce{font-size:3rem;animation:boing .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes boing{from{transform:scale(0)}to{transform:scale(1)}}
.success-title{font-size:1.5rem;font-weight:400;color:var(--text);margin:14px 0 6px;letter-spacing:-.02em}
.success-sub{font-size:13px;color:var(--text-soft);line-height:1.75;font-weight:300}
.success-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin:20px 0;text-align:left}
.srow{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;font-size:13px;color:var(--text)}
.srow:last-child{margin-bottom:0}
.srow .ico{font-size:.95rem;flex-shrink:0}
.cal-link{display:inline-flex;align-items:center;gap:8px;margin-bottom:12px;padding:10px 22px;border-radius:40px;background:#E6FAF7;border:1px solid #A8EDE0;color:#3BBFAA;font-size:13px;font-weight:500;text-decoration:none;transition:all .2s}
.cal-link:hover{background:#D0F5EE}

/* Socials & Footer */
.socials-strip{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:18px}
.soc-label{font-size:11px;color:var(--text-soft);letter-spacing:.06em}
.soc{width:30px;height:30px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;text-decoration:none;transition:transform .2s;border:1px solid var(--border);background:var(--surface)}
.soc:hover{transform:translateY(-2px);border-color:var(--accent);background:var(--accent-bg)}
.soc svg{fill:currentColor;stroke:currentColor}
.soc.ig{color:var(--accent-dark)}
.soc.tt{color:var(--accent-dark)}
.soc.em{color:var(--accent-dark)}
.pfooter{margin-top:12px;text-align:center;font-size:11px;color:var(--text-soft);letter-spacing:.04em}
.pfooter a{color:var(--text-soft);text-decoration:none}
.pfooter a:hover{color:var(--accent-dark)}

/* ── ADMIN FULL PAGE ── */
.admin-page{display:none;background:var(--bg);min-height:calc(100vh - 65px);padding:30px 20px;animation:fadeIn .3s ease}
.admin-wrap{max-width:900px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.03)}
.admin-top{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid var(--border);background:var(--surface)}
.admin-title{font-size:1.2rem;font-weight:400;color:var(--text);letter-spacing:-.01em}
.admin-tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto}
.atab{padding:14px 24px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;font-family:'DM Sans',sans-serif;background:none;border-top:none;border-left:none;border-right:none}
.atab.active{color:var(--text);border-bottom-color:var(--text);background:var(--surface)}
.atab:hover:not(.active){background:var(--surface);color:var(--text)}
.admin-body{padding:28px}

.bi{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:10px;font-size:13px}
.bi-name{font-weight:500;color:var(--text);font-size:14px}
.bi-meta{color:var(--muted);margin-top:3px;font-size:12px}
.bi-email{color:var(--accent-dark);font-size:12px;margin-top:3px}
.bi-note{font-size:12px;color:var(--muted);margin-top:6px;background:white;padding:8px;border-radius:6px;border:1px solid var(--border)}

.block-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:20px}
.block-title{font-size:12px;font-weight:500;color:var(--text);margin-bottom:10px;letter-spacing:.04em;text-transform:uppercase}
.block-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.chip-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.chip{background:var(--accent-bg);border:1px solid var(--accent);border-radius:var(--radius);padding:6px 12px;font-size:12px;color:var(--accent-dark);display:flex;align-items:center;gap:8px}
.chip button{border:none;background:none;color:var(--muted);cursor:pointer;font-size:.8rem;padding:0;line-height:1}
.chip button:hover{color:var(--accent-dark)}

/* Intake List */
.intake-toolbar{display:flex;gap:10px;margin-bottom:18px;align-items:center}
.intake-search{flex:1;max-width:300px}
.intake-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:12px;transition:border-color .2s}
.intake-card:hover{border-color:var(--accent)}
.ic-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.ic-name{font-size:15px;font-weight:500;color:var(--text)}
.ic-date{font-size:11px;color:var(--text-soft);margin-top:2px}
.ic-actions{display:flex;gap:6px}
.ic-btn{padding:5px 12px;font-size:11px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500;border:1px solid var(--border);background:var(--bg);color:var(--muted);transition:all .2s}
.ic-btn:hover{background:var(--surface);color:var(--text);border-color:var(--text)}
.ic-btn.del:hover{background:var(--accent-bg);color:var(--accent-dark);border-color:var(--accent)}
.ic-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px}
.ic-row{display:flex;flex-direction:column;gap:2px}
.ic-lbl{color:var(--text-soft);font-size:10px;text-transform:uppercase;letter-spacing:.04em}
.ic-val{color:var(--text);font-weight:400;line-height:1.4}

.divider{border:none;border-top:1px solid var(--border);margin:1.8rem 0}
@media(max-width:600px){.ic-grid{grid-template-columns:1fr}.tgrid{grid-template-columns:repeat(3,1fr)}.frow2{grid-template-columns:1fr}}

/* OTP specific */
.otp-wrap{display:flex;gap:10px;justify-content:center;margin:20px 0}
.otp-box{width:46px;height:54px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);font-size:1.4rem;font-weight:500;color:var(--text);text-align:center;outline:none;-moz-appearance:textfield;font-family:'DM Sans',sans-serif}
.otp-box::-webkit-outer-spin-button,.otp-box::-webkit-inner-spin-button{-webkit-appearance:none}
.otp-box.filled{border-color:var(--accent);background:var(--accent-bg)}
.resend-row{text-align:center;margin-top:10px;font-size:12px;color:var(--muted)}
.resend-btn{background:none;border:none;color:var(--accent-dark);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;padding:0}
</style>
</head>
<body>

<script>
// ── CONFIG ────────────────────────────────────────────────
const CFG = {
  emailjs_public_key:  'FSw8KbC3UOzz4MoRG',
  emailjs_service_id:  'service_g1akr5m',
  emailjs_template_id: 'template_w51badb',
  emailjs_notify_id:   'template_ot3nzmr',
  admin_password:      'Loving21!',
  day_start: 9,
  day_end:   18,
  blocked_weekdays: [0, 6],
};

window.addEventListener('load', function() { try{ if(typeof emailjs!=='undefined') emailjs.init(CFG.emailjs_public_key); }catch(e){} });

// ── STATE ─────────────────────────────────────────────────
var state = {
  step: 1, selDate: null, selTime: null,
  curMonth: new Date().getMonth(), curYear: new Date().getFullYear(),
  bookings: [], blocked: [], blockedMonths: [],
  pending: null, otp: null, otpExp: null, resendAt: 0,
};

// ── STORAGE ───────────────────────────────────────────────
function loadData() {
  try { var b = localStorage.getItem('omiku_bookings'); if(b) state.bookings = JSON.parse(b); } catch(e) {}
  try { var b = localStorage.getItem('omiku_blocked');  if(b) state.blocked  = JSON.parse(b); } catch(e) {}
  try { var b = localStorage.getItem('omiku_blocked_mo'); if(b) state.blockedMonths = JSON.parse(b); } catch(e) {}
}
function saveBookings() { try { localStorage.setItem('omiku_bookings', JSON.stringify(state.bookings)); } catch(e){} }
function saveBlocked()  { 
  try { 
    localStorage.setItem('omiku_blocked', JSON.stringify(state.blocked)); 
    localStorage.setItem('omiku_blocked_mo', JSON.stringify(state.blockedMonths)); 
  } catch(e){} 
}

// ── HELPERS ───────────────────────────────────────────────
function pad(n) { return String(n).padStart(2,'0'); }
function makeDate(y,m,d) { return y+'-'+pad(m+1)+'-'+pad(d); }
function todayStr() { var t=new Date(); return makeDate(t.getFullYear(),t.getMonth(),t.getDate()); }
function fmtDate(s) {
  var p=s.split('-').map(Number);
  return new Date(p[0],p[1]-1,p[2]).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
}
function fmtMonth(ym) {
  var p=ym.split('-').map(Number);
  return new Date(p[0],p[1]-1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
}
function fmtTime(t) {
  var p=t.split(':').map(Number), h=p[0], m=p[1];
  return (h>12?h-12:(h===0?12:h))+':'+pad(m)+' '+(h>=12?'PM':'AM');
}
function fmtRange(t) {
  var p=t.split(':').map(Number), h=p[0], m=p[1];
  var e = m===30 ? pad(h+1)+':00' : pad(h)+':30';
  return fmtTime(t)+' – '+fmtTime(e);
}
function getSlots() {
  var out=[]; for(var h=CFG.day_start; h<CFG.day_end; h++) { out.push(pad(h)+':00'); out.push(pad(h)+':30'); } return out;
}
function isTaken(date,time)   { return state.bookings.some(function(b){return b.date===date&&b.time===time;}); }
function isBlocked(date,time) { return state.blocked.some(function(b){return b.date===date&&(b.time==='ALL'||b.time===time);}); }
function isDayBlocked(date)   { 
  if(state.blockedMonths.includes(date.substring(0,7))) return true;
  return state.blocked.some(function(b){return b.date===date&&b.time==='ALL';}); 
}
function isWeekend(s) { var p=s.split('-').map(Number); return CFG.blocked_weekdays.indexOf(new Date(p[0],p[1]-1,p[2]).getDay())>=0; }
function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function calLink(b) {
  var p=b.date.split('-').map(Number), q=b.time.split(':').map(Number);
  var fmt=function(d){return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'T'+pad(d.getHours())+pad(d.getMinutes())+'00';};
  var start=p[0]+pad(p[1])+pad(p[2])+'T'+pad(q[0])+pad(q[1])+'00';
  var end=fmt(new Date(p[0],p[1]-1,p[2],q[0],q[1]+30));
  return 'https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent('Meeting with omiku')+'&dates='+start+'/'+end+'&details='+encodeURIComponent('Booked via omiku.co/book\nClient: '+b.name+'\nEmail: '+b.email+'\nPhone: '+b.phone);
}

// ── BOOKING FLOW ──────────────────────────────────────────
function syncSteps() { [1,2,3].forEach(function(n) { document.getElementById('s'+n).className='step'+(n<state.step?' done':n===state.step?' active':''); }); }

function renderStep1() {
  var today=todayStr(), firstDow=new Date(state.curYear,state.curMonth,1).getDay(), dim=new Date(state.curYear,state.curMonth+1,0).getDate();
  var mName=new Date(state.curYear,state.curMonth).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  var days=''; ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(function(d){days+='<div class="dname">'+d+'</div>';});
  for(var i=0;i<firstDow;i++) days+='<div class="day empty"></div>';
  for(var d=1;d<=dim;d++) {
    var s=makeDate(state.curYear,state.curMonth,d);
    var past=s<today, wknd=!past&&isWeekend(s), blk=!past&&isDayBlocked(s), sel=s===state.selDate;
    var cls='day'+(past||wknd?' past':blk?' bday':'')+(s===todayStr()?' today':'')+(sel?' selected':'');
    var click=(past||wknd||blk)?'':'onclick="pickDate(\''+s+'\')"';
    days+='<div class="'+cls+'" '+click+'>'+d+'</div>';
  }
  document.getElementById('content').innerHTML=
    '<p class="slabel">📅 choose a date</p>'+
    '<div class="cal-nav"><button class="cal-arr" onclick="prevMo()">‹</button><span class="cal-month">'+mName+'</span><button class="cal-arr" onclick="nextMo()">›</button></div>'+
    '<div class="cal-grid">'+days+'</div>'+
    (state.selDate?'<div class="nav-row"><span></span><button class="btn-primary" style="width:auto;padding:12px 30px" onclick="goStep(2)">Next →</button></div>':'');
}
function prevMo(){if(state.curMonth===0){state.curMonth=11;state.curYear--;}else state.curMonth--;renderStep1();}
function nextMo(){if(state.curMonth===11){state.curMonth=0;state.curYear++;}else state.curMonth++;renderStep1();}
function pickDate(s){state.selDate=s;state.selTime=null;renderStep1();}

function renderStep2() {
  var sl=getSlots(), grid='';
  sl.forEach(function(t) {
    var taken=isTaken(state.selDate,t), blk=isBlocked(state.selDate,t), sel=t===state.selTime;
    var cls='slot'+(taken?' taken':blk?' bslot':sel?' selected':'');
    var inner=taken?fmtTime(t)+'<br><small>booked</small>':blk?fmtTime(t)+'<br><small>unavail</small>':fmtTime(t);
    grid+='<div class="'+cls+'" '+(!taken&&!blk?'onclick="pickTime(\''+t+'\')"':'')+'>'+inner+'</div>';
  });
  document.getElementById('content').innerHTML=
    '<p class="slabel">🕐 pick a 30-min slot</p>'+
    '<p style="font-size:.78rem;color:var(--muted);margin-bottom:14px">'+fmtDate(state.selDate)+'</p>'+
    '<div class="tgrid">'+grid+'</div>'+
    '<div class="nav-row"><button class="btn-ghost" onclick="goStep(1)">← Back</button>'+
    (state.selTime?'<button class="btn-primary" style="width:auto;padding:12px 30px" onclick="goStep(3)">Next →</button>':'<span style="font-size:.72rem;color:var(--text-soft)">select a slot</span>')+'</div>';
}
function pickTime(t){state.selTime=t;renderStep2();}

function renderStep3() {
  var pb=state.pending||{};
  document.getElementById('content').innerHTML=
    '<div class="pill"><div class="pill-ico">✿</div><div><div class="pill-date">'+fmtDate(state.selDate)+'</div><div class="pill-time">⏱ '+fmtRange(state.selTime)+'</div></div></div>'+
    '<p class="slabel">💌 your details</p>'+
    '<div class="frow2"><div class="frow"><label>First & Last Name</label><input id="inp-name" type="text" value="'+(pb.name||'')+'"></div>'+
    '<div class="frow"><label>Phone Number</label><input id="inp-phone" type="tel" value="'+(pb.phone||'')+'"></div></div>'+
    '<div class="frow"><label>Email Address</label><input id="inp-email" type="email" value="'+(pb.email||'')+'"></div>'+
    '<div class="frow"><label>What would you like to discuss? <span style="color:#D5C5D0;font-weight:400">(optional)</span></label><textarea id="inp-note" rows="3">'+(pb.note||'')+'</textarea></div>'+
    '<div class="err" id="err"></div><button class="btn-primary" id="sendBtn" onclick="sendCode()">✉ send verification code</button>'+
    '<div class="nav-row"><button class="btn-ghost" onclick="goStep(2)">← Back</button><span></span></div>';
}

function sendCode() {
  var n=document.getElementById('inp-name').value.trim(), p=document.getElementById('inp-phone').value.trim(), e=document.getElementById('inp-email').value.trim(), no=document.getElementById('inp-note').value.trim();
  if(!n||!p||!e||e.indexOf('@')<0) return showErr('Please fill out all required fields with a valid email.');
  if(isTaken(state.selDate,state.selTime)) return showErr('Slot just taken! Go back and pick another time.');
  var btn=document.getElementById('sendBtn'); btn.textContent='⏳ sending...'; btn.disabled=true;
  var code=String(Math.floor(100000+Math.random()*900000));
  state.otp=code; state.otpExp=Date.now()+10*60*1000; state.resendAt=Date.now()+60*1000; state.pending={name:n,phone:p,email:e,note:no};
  if(typeof emailjs!=='undefined'){
    emailjs.send(CFG.emailjs_service_id,CFG.emailjs_template_id,{to_email:e,name:n,code:code}).then(function(){renderVerify(true);},function(){showErr('Failed to send email. Try again.');btn.textContent='✉ send code';btn.disabled=false;});
  } else { console.log('DEV CODE: '+code); renderVerify(false); }
}

function renderVerify(sent) {
  var em=state.pending.email;
  document.getElementById('content').innerHTML=
    '<div style="font-size:2.8rem;text-align:center;margin-bottom:10px">📬</div><div class="v-title">check your inbox</div>'+
    '<p class="v-sub">We sent a 6-digit code to <strong>'+em+'</strong><br>Enter it below to confirm.'+(sent?'':' (dev: check console)')+'</p>'+
    '<div class="otp-wrap" id="otpWrap">'+[0,1,2,3,4,5].map(function(i){return '<input class="otp-box" type="number" id="o'+i+'" oninput="otpIn(this,'+i+')" onkeydown="otpKey(event,'+i+')">';}).join('')+'</div>'+
    '<div class="err" id="err"></div><button class="btn-primary" id="verifyBtn" onclick="verifyAndBook()">✦ confirm booking</button>'+
    '<div class="resend-row">Didn\'t get it? <button class="resend-btn" id="resendBtn" onclick="resend()">Resend code</button><span id="resendTimer"></span></div>'+
    '<div class="nav-row"><button class="btn-ghost" onclick="renderStep3()">← Edit details</button><span></span></div>';
  document.getElementById('o0').focus(); tickResend();
}
function otpIn(el,i){ el.value=el.value.replace(/[^0-9]/g,'').slice(-1); el.classList.toggle('filled',el.value!==''); if(el.value&&i<5) document.getElementById('o'+(i+1)).focus(); if(getOtp().length===6) verifyAndBook(); }
function otpKey(e,i){ if(e.key==='Backspace'&&!e.target.value&&i>0) document.getElementById('o'+(i-1)).focus(); }
function getOtp(){ return [0,1,2,3,4,5].map(function(i){var el=document.getElementById('o'+i);return el?el.value:'';}).join(''); }
function tickResend(){ var btn=document.getElementById('resendBtn'), sp=document.getElementById('resendTimer'); if(!btn||!sp)return; var left=Math.ceil((state.resendAt-Date.now())/1000); if(left>0){btn.disabled=true;sp.textContent=' ('+left+'s)';setTimeout(tickResend,1000);}else{btn.disabled=false;sp.textContent='';} }
function resend(){ if(Date.now()<state.resendAt)return; var code=String(Math.floor(100000+Math.random()*900000)); state.otp=code; state.otpExp=Date.now()+10*60*1000; state.resendAt=Date.now()+60*1000; if(typeof emailjs!=='undefined') emailjs.send(CFG.emailjs_service_id,CFG.emailjs_template_id,{to_email:state.pending.email,name:state.pending.name,code:code}); tickResend(); }

function verifyAndBook() {
  var ent=getOtp(); if(ent.length<6) return showErr('Enter full 6-digit code.'); if(Date.now()>state.otpExp) return showErr('Code expired.'); if(ent!==state.otp) return showErr('Incorrect code.');
  var b={id:genId(),name:state.pending.name,phone:state.pending.phone,email:state.pending.email,note:state.pending.note,date:state.selDate,time:state.selTime,ts:new Date().toISOString()};
  state.bookings.push(b); saveBookings();
  if(typeof emailjs!=='undefined') try{ emailjs.send(CFG.emailjs_service_id,CFG.emailjs_notify_id,{booker_name:b.name,booker_email:b.email,booker_phone:b.phone,booking_date:fmtDate(b.date),booking_time:fmtRange(b.time),note:b.note,calendar_link:calLink(b)}); }catch(e){}
  state.pending=null; state.otp=null; renderSuccess(b);
}
function showErr(m){var el=document.getElementById('err');if(el){el.textContent=m;el.style.display='block';}}
function renderSuccess(b) {
  document.getElementById('stepsBar').style.display='none';
  document.getElementById('content').innerHTML=
    '<div class="success-wrap"><div class="success-bounce">🌸</div><div class="success-title">you\'re booked!</div><p class="success-sub">Can\'t wait to chat, '+b.name.split(' ')[0]+'!</p>'+
    '<div class="success-box"><div class="srow"><span class="ico">📅</span><span>'+fmtDate(b.date)+'</span></div><div class="srow"><span class="ico">⏱</span><span>'+fmtRange(b.time)+'</span></div></div>'+
    '<a href="'+calLink(b)+'" target="_blank" rel="noopener" class="cal-link">📅 add to calendar</a><br><button class="btn-primary" onclick="resetFlow()" style="margin-top:12px">book another</button></div>';
}
function resetFlow(){state.step=1;state.selDate=null;state.selTime=null;document.getElementById('stepsBar').style.display='flex';goStep(1);}
function goStep(n){state.step=n;syncSteps();if(n===1)renderStep1();else if(n===2)renderStep2();else if(n===3)renderStep3();}

// ── ADMIN ─────────────────────────────────────────────────
var authed=false, adminTab='bookings', adminSearch='';

document.getElementById('logoArea').addEventListener('click',function(){ openAdmin(); });
document.getElementById('adminLink').addEventListener('click',function(e){ e.preventDefault(); openAdmin(); });
document.getElementById('emailSocLink').href = 'mail'+'to:'+'hello'+'@'+'omiku.co';

function openAdmin() {
  document.getElementById('mainPage').style.display='none';
  document.getElementById('siteNav').style.display='none';
  document.getElementById('siteFooter').style.display='none';
  document.getElementById('adminPage').style.display='block';
  if(!authed) {
    document.getElementById('adminLoginWrap').style.display='block';
    document.getElementById('adminDashWrap').style.display='none';
    setTimeout(function(){document.getElementById('pwd').focus();},50);
  } else {
    document.getElementById('adminLoginWrap').style.display='none';
    document.getElementById('adminDashWrap').style.display='block';
    renderAdmin();
  }
}
function closeAdmin() {
  document.getElementById('adminPage').style.display='none';
  document.getElementById('mainPage').style.display='flex';
  document.getElementById('siteNav').style.display='flex';
  document.getElementById('siteFooter').style.display='block';
}
function chkPwd() {
  var el=document.getElementById('pwd');
  if(el&&el.value===CFG.admin_password){ authed=true; el.value=''; openAdmin(); }
  else{ var err=document.getElementById('pwd-err'); err.textContent='Incorrect password.'; err.style.display='block'; }
}
function logout() { authed=false; closeAdmin(); }

function setAdminTab(tab) {
  adminTab = tab; adminSearch = '';
  document.querySelectorAll('.atab').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('tab-'+tab).classList.add('active');
  renderAdmin();
}

function renderAdmin() {
  if(adminTab === 'bookings') renderAdminBookings();
  else renderAdminIntakes(adminTab);
}

// Admin: Bookings View
function renderAdminBookings() {
  var today=todayStr();
  var upcoming=state.bookings.filter(function(b){return b.date>=today;}).sort(function(a,b){return a.date.localeCompare(b.date)||a.time.localeCompare(b.time);});
  var past=state.bookings.filter(function(b){return b.date<today;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  
  var upHTML=upcoming.length?upcoming.map(function(b){
    return '<div class="bi"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div class="bi-name">'+b.name+'</div><button class="btn-danger" onclick="cancelBooking(\''+b.id+'\')">cancel</button></div>'+
      '<div class="bi-meta">📅 '+fmtDate(b.date)+' · '+fmtRange(b.time)+'</div><div class="bi-email">✉ '+b.email+' · 📱 '+(b.phone||'—')+'</div>'+
      (b.note?'<div class="bi-note">💬 '+b.note+'</div>':'')+
      '<div style="margin-top:8px"><a href="'+calLink(b)+'" target="_blank" class="cal-link" style="padding:4px 10px;font-size:11px">add to calendar</a></div></div>';
  }).join(''):'<p style="font-size:12px;color:var(--text-soft);padding:10px 0">No upcoming bookings.</p>';

  var pstHTML=past.length?'<details style="margin-top:20px;margin-bottom:10px"><summary style="font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;text-transform:uppercase;letter-spacing:.06em">past bookings ('+past.length+')</summary><div style="margin-top:10px">'+past.map(function(b){
    return '<div class="bi" style="opacity:.6"><div class="bi-name">'+b.name+'</div><div class="bi-meta">📅 '+fmtDate(b.date)+' · '+fmtRange(b.time)+'</div></div>';
  }).join('')+'</div></details>':'';

  var sl=getSlots();
  var blkChips=state.blocked.length?'<div class="chip-list">'+state.blocked.map(function(b,i){return '<div class="chip">'+(b.time==='ALL'?'🚫 '+b.date+' (all day)':'🕐 '+b.date+' '+fmtTime(b.time))+'<button onclick="unblock('+i+')">✕</button></div>';}).join('')+'</div>':'<span style="font-size:11px;color:var(--text-soft)">None</span>';
  var blkMoChips=state.blockedMonths.length?'<div class="chip-list">'+state.blockedMonths.map(function(m,i){return '<div class="chip">🚫 '+fmtMonth(m)+'<button onclick="unblockMonth('+i+')">✕</button></div>';}).join('')+'</div>':'<span style="font-size:11px;color:var(--text-soft)">None</span>';

  document.getElementById('adminBody').innerHTML=
    '<div style="display:grid;grid-template-columns:1fr 340px;gap:24px;">'+
      '<div>'+
        '<h3 style="font-size:13px;color:var(--text);margin-bottom:12px;text-transform:uppercase;letter-spacing:.04em">Upcoming Sessions</h3>'+
        upHTML + pstHTML +
      '</div>'+
      '<div>'+
        '<div class="block-box">'+
          '<div class="block-title">Block Dates & Times</div>'+
          '<div class="block-row"><input type="date" id="bl-date" min="'+today+'" value="'+today+'">'+
          '<select id="bl-time"><option value="ALL">All Day</option>'+sl.map(function(t){return '<option value="'+t+'">'+fmtTime(t)+'</option>';}).join('')+'</select>'+
          '<button class="btn-sm" onclick="blockSlot()">Block</button></div>'+
          '<div style="margin-top:12px">'+blkChips+'</div>'+
        '</div>'+
        '<div class="block-box">'+
          '<div class="block-title">Block Entire Months</div>'+
          '<div class="block-row"><input type="month" id="bl-month"><button class="btn-sm" onclick="blockMonth()">Block Month</button></div>'+
          '<div style="margin-top:12px">'+blkMoChips+'</div>'+
        '</div>'+
      '</div>'+
    '</div>';
}
function cancelBooking(id){ if(confirm('Cancel this booking?')){state.bookings=state.bookings.filter(function(b){return b.id!==id;});saveBookings();renderAdminBookings();} }
function blockSlot(){ var d=document.getElementById('bl-date').value, t=document.getElementById('bl-time').value; if(!d||state.blocked.some(function(b){return b.date===d&&b.time===t;}))return; state.blocked.push({date:d,time:t}); saveBlocked(); renderAdminBookings(); }
function unblock(i){ state.blocked.splice(i,1); saveBlocked(); renderAdminBookings(); }
function blockMonth(){ var m=document.getElementById('bl-month').value; if(!m||state.blockedMonths.includes(m))return; state.blockedMonths.push(m); state.blockedMonths.sort(); saveBlocked(); renderAdminBookings(); }
function unblockMonth(i){ state.blockedMonths.splice(i,1); saveBlocked(); renderAdminBookings(); }

// Admin: Intake Forms View
function getIntakes(type) {
  var key = type === 'social' ? 'omiku_intake_social' : 'omiku_intake_marketing';
  try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch(e){ return []; }
}
function saveIntakes(type, data) {
  var key = type === 'social' ? 'omiku_intake_social' : 'omiku_intake_marketing';
  localStorage.setItem(key, JSON.stringify(data));
}

window.doIntakeSearch = function() { adminSearch = document.getElementById('iSearch').value.toLowerCase(); renderAdmin(); };
function renderAdminIntakes(type) {
  var title = type === 'social' ? 'Social Media Intake Forms' : 'Marketing Intake Forms';
  var data = getIntakes(type);
  
  var filtered = data.filter(function(item) {
    if(!adminSearch) return true;
    var str = JSON.stringify(item).toLowerCase();
    return str.indexOf(adminSearch) !== -1;
  });

  filtered.sort(function(a,b){ return new Date(b.ts||0) - new Date(a.ts||0); });

  var listHTML = filtered.length ? filtered.map(function(item) {
    // Safely extract name & date
    var name = item.name || 'Unknown User';
    if(item.rows && Array.isArray(item.rows)) {
       var nRow = item.rows.find(function(r){ return r.k.toLowerCase()==='name'; });
       if(nRow) name = nRow.v;
    }
    var dStr = item.ts ? new Date(item.ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}) : 'No date';

    // Build preview rows
    var rowsHTML = '';
    if(item.rows && Array.isArray(item.rows)) {
      rowsHTML = item.rows.map(function(r){
        return '<div class="ic-row"><span class="ic-lbl">'+r.k+'</span><span class="ic-val">'+r.v+'</span></div>';
      }).join('');
    } else {
      rowsHTML = '<div class="ic-row"><span class="ic-lbl">Raw Data</span><span class="ic-val">'+JSON.stringify(item)+'</span></div>';
    }

    return '<div class="intake-card">'+
      '<div class="ic-top">'+
        '<div><div class="ic-name">'+name+'</div><div class="ic-date">Submitted: '+dStr+'</div></div>'+
        '<div class="ic-actions">'+
          '<button class="ic-btn" onclick="copyIntake(\''+type+'\',\''+item.id+'\')">Copy for Docs</button>'+
          '<button class="ic-btn del" onclick="delIntake(\''+type+'\',\''+item.id+'\')">Delete</button>'+
        '</div>'+
      '</div>'+
      '<div class="ic-grid">'+rowsHTML+'</div>'+
    '</div>';
  }).join('') : '<p style="color:var(--text-soft);font-size:13px;padding:20px 0;text-align:center">No forms found.</p>';

  document.getElementById('adminBody').innerHTML = 
    '<div class="intake-toolbar">'+
      '<h3 style="font-size:15px;color:var(--text);flex:1">'+title+' ('+filtered.length+')</h3>'+
      '<input type="text" id="iSearch" class="intake-search" placeholder="Search name, handle, keyword..." value="'+adminSearch+'" onkeyup="doIntakeSearch()">'+
    '</div>'+
    '<div style="max-height:65vh;overflow-y:auto;padding-right:10px">'+listHTML+'</div>';
}

window.copyIntake = function(type, id) {
  var data = getIntakes(type);
  var item = data.find(function(x){return String(x.id)===String(id);});
  if(!item) return;
  var txt = "--- OMIKU INTAKE FORM ---\nType: "+type.toUpperCase()+"\nDate: "+(item.ts?new Date(item.ts).toLocaleString():'N/A')+"\n\n";
  if(item.rows && Array.isArray(item.rows)) {
    txt += item.rows.map(function(r){ return r.k.toUpperCase() + ":\n" + r.v; }).join('\n\n');
  } else {
    txt += JSON.stringify(item, null, 2);
  }
  navigator.clipboard.writeText(txt).then(function(){alert('Copied to clipboard! You can paste it into Google Docs.');});
};

window.delIntake = function(type, id) {
  if(!confirm('Are you sure you want to permanently delete this form?')) return;
  var data = getIntakes(type).filter(function(x){return String(x.id)!==String(id);});
  saveIntakes(type, data);
  renderAdminIntakes(type);
};
