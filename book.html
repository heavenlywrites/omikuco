<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600&family=Hachi+Maru+Pop&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>


<style>
/* в”Ђв”Ђв”Ђ Reset в”Ђв”Ђв”Ђ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
   вљ™пёЏ  QUICK CONFIG (also editable in JS)
   в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */

:root {
  --pink:     #FFD6E7;
  --pink-mid: #FFC2DA;
  --pink-dk:  #D4608A;
  --lav:      #EDE0FF;
  --lav-dk:   #8B5CC8;
  --peach:    #FFECD6;
  --peach-dk: #C47B30;
  --mint:     #C9F5F0;
  --mint-dk:  #3BBFAA;
  --bg:       #FFF5F8;
  --text:     #1A1A2E;
  --text-sm:  #B07CA0;
  --border:   #F0DAEA;
}

/* в”Ђв”Ђв”Ђ Body в”Ђв”Ђв”Ђ */
body {
  min-height: 100vh;
  background: var(--bg);
  font-family: 'Plus Jakarta Sans', sans-serif;
  overflow-x: hidden;
  position: relative;
  color: var(--text);
}

/* в”Ђв”Ђв”Ђ Floating Shapes в”Ђв”Ђв”Ђ */
.shape { position: fixed; pointer-events: none; border-radius: 50%; z-index: 0; }
.s1 { width:320px;height:320px;background:#FFD6E7;top:-80px;left:-80px;opacity:.6;animation:float1 9s ease-in-out infinite; }
.s2 { width:220px;height:220px;background:#FFE4B5;bottom:-60px;right:20px;opacity:.5;animation:float2 11s ease-in-out infinite; }
.s3 { width:160px;height:160px;background:#C9F5F0;top:40%;right:-50px;opacity:.55;animation:float1 13s ease-in-out infinite reverse; }
.s4 { width:100px;height:100px;background:#E8D5FF;bottom:20%;left:-20px;opacity:.5;animation:float2 8s ease-in-out infinite; }
@keyframes float1 { 0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(18px,-18px) rotate(8deg)} }
@keyframes float2 { 0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(-15px,15px) rotate(-6deg)} }

.sparkles { position:fixed;inset:0;pointer-events:none;z-index:0; }
.sp { position:absolute;font-size:18px;animation:twinkle 4s ease-in-out infinite;opacity:0; }
.sp:nth-child(1){top:12%;left:15%;animation-delay:0s}
.sp:nth-child(2){top:20%;right:18%;animation-delay:1.2s}
.sp:nth-child(3){bottom:28%;left:12%;animation-delay:2.1s}
.sp:nth-child(4){bottom:18%;right:14%;animation-delay:.7s}
.sp:nth-child(5){top:55%;left:6%;animation-delay:3s}
.sp:nth-child(6){top:35%;right:6%;animation-delay:1.8s}
@keyframes twinkle { 0%,100%{opacity:0;transform:scale(.6) rotate(0deg)}50%{opacity:.55;transform:scale(1) rotate(20deg)} }

/* в”Ђв”Ђв”Ђ Page wrapper в”Ђв”Ђв”Ђ */
.page {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 36px 20px 80px;
}

/* в”Ђв”Ђв”Ђ Header в”Ђв”Ђв”Ђ */
.header {
  text-align: center;
  margin-bottom: 24px;
  animation: popIn .7s cubic-bezier(.34,1.56,.64,1) both;
}
.header-logo { font-family:'Hachi Maru Pop',cursive; font-size:1.9rem; color:var(--text); letter-spacing:1px; cursor:default; user-select:none; }
.header-logo span { color:var(--pink-dk); }
.header-sub { font-size:.7rem; color:var(--text-sm); letter-spacing:.14em; text-transform:uppercase; margin-top:5px; }

/* в”Ђв”Ђв”Ђ Card в”Ђв”Ђв”Ђ */
.card {
  background: rgba(255,255,255,.84);
  backdrop-filter: blur(22px);
  border: 1.5px solid rgba(255,255,255,.96);
  border-radius: 32px;
  box-shadow: 0 8px 48px rgba(255,160,200,.18), 0 2px 8px rgba(0,0,0,.04);
  width: 100%; max-width: 700px;
  overflow: hidden;
  animation: popIn .7s .08s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes popIn {
  from { opacity:0; transform:scale(.9) translateY(22px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}

/* в”Ђв”Ђв”Ђ Step Bar в”Ђв”Ђв”Ђ */
.steps {
  display:flex; align-items:center; gap:6px;
  padding: 16px 24px;
  background: linear-gradient(135deg,#FFF0F6,#F5EDFF);
  border-bottom: 1px solid var(--border);
}
.step { display:flex;align-items:center;gap:7px;flex:1;font-size:.67rem;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#C9A4BE;transition:color .3s; }
.step.active { color:var(--pink-dk); }
.step.done   { color:var(--mint-dk); }
.step-num { width:22px;height:22px;border-radius:50%;background:#F0DAEA;color:#C9A4BE;font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s; }
.step.active .step-num { background:var(--pink);color:var(--pink-dk); }
.step.done   .step-num { background:#D5F5EF;color:var(--mint-dk); }
.step-arrow { color:#E0C8D8;font-size:.75rem;flex-shrink:0; }

/* в”Ђв”Ђв”Ђ Content в”Ђв”Ђв”Ђ */
.content { padding:28px; }

/* в”Ђв”Ђв”Ђ Labels в”Ђв”Ђв”Ђ */
.section-label { font-size:.67rem;font-weight:700;color:var(--text-sm);letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px; }

/* в”Ђв”Ђв”Ђ Calendar в”Ђв”Ђв”Ђ */
.cal-nav { display:flex;align-items:center;justify-content:space-between;margin-bottom:14px; }
.cal-month { font-family:'Fraunces',serif;font-size:1.1rem;font-weight:300;color:var(--text); }
.cal-arrow { width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);color:var(--text-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .2s; }
.cal-arrow:hover { background:var(--pink);border-color:var(--pink-mid);color:var(--pink-dk); }

.cal-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:3px; }
.cal-dname { text-align:center;font-size:.58rem;font-weight:700;color:#C9A4BE;letter-spacing:.08em;text-transform:uppercase;padding:6px 0; }
.cal-day { aspect-ratio:1;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:.78rem;cursor:pointer;transition:all .2s;position:relative; }
.cal-day:hover:not(.empty):not(.past):not(.blocked-day) { background:var(--pink);color:var(--pink-dk); }
.cal-day.empty    { cursor:default; }
.cal-day.past     { color:#D5C5D0;cursor:not-allowed; }
.cal-day.today    { font-weight:700; }
.cal-day.today::after { content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--pink-dk); }
.cal-day.selected { background:linear-gradient(135deg,#FFD6E7,#E8C8FF);color:var(--pink-dk);font-weight:700;box-shadow:0 4px 14px rgba(212,96,138,.25); }
.cal-day.blocked-day { background:#F8F0F5;color:#D5C5D0;cursor:not-allowed;text-decoration:line-through;font-size:.7rem; }

/* в”Ђв”Ђв”Ђ Time Slots в”Ђв”Ђв”Ђ */
.time-grid { display:grid;grid-template-columns:repeat(4,1fr);gap:8px; }
.slot { padding:11px 4px;border-radius:14px;border:1.5px solid var(--border);background:var(--bg);text-align:center;font-size:.73rem;font-weight:500;color:var(--text-sm);cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);line-height:1.4; }
.slot:hover:not(.taken):not(.blocked-slot) { background:var(--pink);border-color:var(--pink-mid);color:var(--pink-dk);transform:translateY(-2px);box-shadow:0 4px 12px rgba(212,96,138,.2); }
.slot.selected { background:linear-gradient(135deg,#FFD6E7,#E8C8FF);border-color:var(--pink-mid);color:var(--pink-dk);font-weight:700;box-shadow:0 4px 18px rgba(212,96,138,.3);transform:translateY(-2px); }
.slot.taken    { background:#F5F0F5;border-color:#EDE0EA;color:#CDB8C8;cursor:not-allowed;font-size:.62rem; }
.slot.blocked-slot { background:#F5F0F5;border-color:#EDE0EA;color:#CDB8C8;cursor:not-allowed;font-size:.62rem; }

/* в”Ђв”Ђв”Ђ Summary Pill в”Ђв”Ђв”Ђ */
.booking-pill {
  display:flex;align-items:center;gap:14px;
  background:linear-gradient(135deg,#FFF0F6,#F5EDFF);
  border:1.5px solid var(--border);border-radius:18px;padding:14px 18px;margin-bottom:20px;
}
.pill-icon { font-size:1.7rem;flex-shrink:0; }
.pill-date { font-family:'Fraunces',serif;font-size:1rem;font-weight:400;color:var(--text); }
.pill-time { font-size:.77rem;color:var(--text-sm);margin-top:2px; }

/* в”Ђв”Ђв”Ђ Form в”Ђв”Ђв”Ђ */
.frow { margin-bottom:14px; }
.frow-2 { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
label { display:block;font-size:.65rem;font-weight:700;color:var(--text-sm);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px; }
input, textarea {
  width:100%;padding:11px 15px;
  border-radius:14px;border:1.5px solid var(--border);
  background:var(--bg);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.86rem;color:var(--text);
  outline:none;transition:border-color .2s,box-shadow .2s;
}
input:focus, textarea:focus { border-color:var(--pink-mid);box-shadow:0 0 0 3px rgba(255,194,218,.22); }
textarea { resize:none; }

/* в”Ђв”Ђв”Ђ Buttons в”Ђв”Ђв”Ђ */
.btn-primary {
  width:100%;padding:14px;border-radius:18px;border:none;
  background:linear-gradient(135deg,#FFB3D1,#C8A0F8);
  color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:.88rem;font-weight:700;letter-spacing:.04em;
  cursor:pointer;box-shadow:0 6px 22px rgba(212,96,138,.35);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
}
.btn-primary:hover { transform:translateY(-2px);box-shadow:0 10px 28px rgba(212,96,138,.45); }
.btn-primary:disabled { opacity:.6;cursor:not-allowed;transform:none; }

.btn-ghost {
  padding:10px 20px;border-radius:14px;border:1.5px solid var(--border);
  background:transparent;color:var(--text-sm);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.78rem;font-weight:500;
  cursor:pointer;transition:all .2s;
}
.btn-ghost:hover { background:var(--pink);border-color:var(--pink-mid);color:var(--pink-dk); }

/* в”Ђв”Ђв”Ђ Nav Row в”Ђв”Ђв”Ђ */
.nav-row { display:flex;justify-content:space-between;align-items:center;margin-top:22px;padding-top:18px;border-top:1px solid var(--border); }

/* в”Ђв”Ђв”Ђ Error в”Ђв”Ђв”Ђ */
.err-box { display:none;margin-top:8px;padding:10px 14px;background:#FFF0F6;border:1px solid var(--pink);border-radius:12px;font-size:.77rem;color:var(--pink-dk); }

/* в”Ђв”Ђв”Ђ Success в”Ђв”Ђв”Ђ */
.success-wrap { text-align:center;padding:36px 16px; }
.success-bounce { font-size:3.6rem;animation:boing .6s cubic-bezier(.34,1.56,.64,1) both; }
@keyframes boing { from{transform:scale(0)} to{transform:scale(1)} }
.success-title { font-family:'Hachi Maru Pop',cursive;font-size:1.55rem;color:var(--text);margin:14px 0 6px; }
.success-sub { font-size:.83rem;color:var(--text-sm);line-height:1.75; }
.success-box { background:linear-gradient(135deg,#FFF0F6,#F5EDFF);border:1.5px solid var(--border);border-radius:18px;padding:18px;margin:20px 0;text-align:left; }
.s-row { display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;font-size:.84rem;color:var(--text); }
.s-row:last-child { margin-bottom:0; }
.s-row .ico { font-size:.95rem;flex-shrink:0; }

/* в”Ђв”Ђв”Ђ Socials Strip в”Ђв”Ђв”Ђ */
.socials-strip { display:flex;align-items:center;justify-content:center;gap:10px;margin-top:18px;animation:popIn .7s .3s cubic-bezier(.34,1.56,.64,1) both; }
.soc-label { font-size:.57rem;color:#C9A4BE;letter-spacing:.1em;text-transform:uppercase; }
.soc { width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:transform .2s; }
.soc:hover { transform:translateY(-2px) scale(1.12); }
.soc.ig { background:#FFE0EF; }
.soc.tt { background:#EDE0FF; }
.soc.em { background:#FFECD6; }

/* в”Ђв”Ђв”Ђ Page footer в”Ђв”Ђв”Ђ */
.pfooter { margin-top:12px;text-align:center;font-size:.58rem;color:#C9A4BE;letter-spacing:.08em; }
.pfooter a { color:#C9A4BE;text-decoration:none; }
.pfooter a:hover { color:var(--pink-dk); }

/* в”Ђв”Ђв”Ђ Modal в”Ђв”Ђв”Ђ */
.overlay { position:fixed;inset:0;z-index:999;background:rgba(26,26,46,.38);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0}to{opacity:1} }
.modal {
  background:rgba(255,255,255,.97);border:1.5px solid rgba(255,255,255,.96);border-radius:28px;
  padding:30px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto;
  box-shadow:0 20px 60px rgba(212,96,138,.2);
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both;
  position:relative;
}
.modal-x { position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);color:var(--text-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem; }
.modal-title { font-family:'Hachi Maru Pop',cursive;font-size:1.25rem;color:var(--text);margin-bottom:3px; }
.modal-sub { font-size:.68rem;color:var(--text-sm);letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px; }

/* в”Ђв”Ђв”Ђ Admin в”Ђв”Ђв”Ђ */
.booking-item { background:linear-gradient(135deg,#FFF0F6,#F5EDFF);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:8px;font-size:.79rem; }
.bi-name { font-weight:700;color:var(--text); }
.bi-meta { color:var(--text-sm);margin-top:2px; }
.bi-email { color:var(--lav-dk);font-size:.73rem;margin-top:2px; }
.bi-note { font-size:.7rem;color:var(--lav-dk);margin-top:4px; }

.block-row { display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-top:10px; }
.block-row input[type=date], .block-row select { padding:8px 11px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg);font-family:'Plus Jakarta Sans',sans-serif;font-size:.78rem;color:var(--text);outline:none; }
.block-row input[type=date]:focus, .block-row select:focus { border-color:var(--pink-mid); }

.btn-sm { padding:8px 16px;border-radius:11px;border:none;background:linear-gradient(135deg,#FFB3D1,#C8A0F8);color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-size:.74rem;font-weight:700;cursor:pointer; }
.btn-danger { padding:4px 10px;border-radius:8px;border:1px solid var(--pink);background:#FFF0F6;color:var(--pink-dk);font-size:.64rem;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif; }

.chip-list { display:flex;flex-wrap:wrap;gap:6px;margin-top:8px; }
.chip { background:#F5EDFF;border:1px solid #D4BBFF;border-radius:8px;padding:4px 10px;font-size:.67rem;color:var(--lav-dk);display:flex;align-items:center;gap:6px; }
.chip button { border:none;background:none;color:#C9A4BE;cursor:pointer;font-size:.7rem;padding:0;line-height:1; }

.divider { height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:20px 0; }

/* в”Ђв”Ђв”Ђ OTP Boxes в”Ђв”Ђв”Ђ */
.otp-wrap { display:flex;gap:10px;justify-content:center;margin:20px 0; }
.otp-box {
  width:48px;height:58px;border-radius:14px;
  border:1.5px solid var(--border);background:var(--bg);
  font-family:'Fraunces',serif;font-size:1.5rem;font-weight:600;
  color:var(--text);text-align:center;outline:none;
  transition:border-color .2s,box-shadow .2s;
  -moz-appearance:textfield;
}
.otp-box::-webkit-outer-spin-button,
.otp-box::-webkit-inner-spin-button { -webkit-appearance:none; }
.otp-box:focus { border-color:var(--pink-mid);box-shadow:0 0 0 3px rgba(255,194,218,.22); }
.otp-box.filled { border-color:var(--pink-mid);background:linear-gradient(135deg,#FFF5F8,#F5EDFF); }

.verify-icon { font-size:2.8rem;text-align:center;margin-bottom:10px; }
.verify-title { font-family:'Fraunces',serif;font-size:1.05rem;font-weight:400;color:var(--text);text-align:center;margin-bottom:6px; }
.verify-sub { font-size:.78rem;color:var(--text-sm);text-align:center;line-height:1.7;margin-bottom:4px; }
.resend-row { text-align:center;margin-top:10px;font-size:.72rem;color:var(--text-sm); }
.resend-btn { background:none;border:none;color:var(--pink-dk);font-family:'Plus Jakarta Sans',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;padding:0; }
.resend-btn:disabled { color:var(--text-sm);cursor:default; }

@media(max-width:540px){
  .time-grid { grid-template-columns:repeat(3,1fr); }
  .frow-2 { grid-template-columns:1fr; }
  .steps { padding:12px 14px; }
  .step span { display:none; }
  .content { padding:20px 14px; }
}
</style>
</head>

  selectedTime: null,
  curMonth: new Date().getMonth(),
  curYear:  new Date().getFullYear(),

// в”Ђв”Ђ Storage в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

// в”Ђв”Ђ Helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function padded(n) { return String(n).padStart(2,'0'); }
function ds(y,m,d) { return `${y}-${padded(m+1)}-${padded(d)}`; }
function todayStr() { const t=new Date(); return ds(t.getFullYear(),t.getMonth(),t.getDate()); }

function fmtDate(str) {
  const [y,m,d]=str.split('-').map(Number);
  return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
function fmtTime(t) {
  const [h,m]=t.split(':').map(Number);
  return `${h>12?h-12:(h===0?12:h)}:${padded(m)} ${h>=12?'PM':'AM'}`;
}
function fmtRange(t) {
  const [h,m]=t.split(':').map(Number);
  const e=m===30?`${padded(h+1)}:00`:`${padded(h)}:30`;
  return `${fmtTime(t)} вЂ“ ${fmtTime(e)}`;
}
function slots() {
  const out=[];
  for(let h=CFG.day_start;h<CFG.day_end;h++){out.push(`${padded(h)}:00`);out.push(`${padded(h)}:30`);}
  return out;
}
function isTaken(date,time)   { return state.bookings.some(b=>b.date===date&&b.time===time); }
function isBlocked(date,time) { return state.blocked.some(b=>b.date===date&&(b.time==='ALL'||b.time===time)); }
function isDayBlocked(date)   { return state.blocked.some(b=>b.date===date&&b.time==='ALL'); }
function isWeekend(str)       { const [y,m,d]=str.split('-').map(Number); return CFG.blocked_weekdays.includes(new Date(y,m-1,d).getDay()); }
function genId()              { return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

// в”Ђв”Ђ Step bar в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

}

// в”Ђв”Ђ Step 1: Calendar в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderStep1() {
  const today=todayStr();
  const firstDow=new Date(state.curYear,state.curMonth,1).getDay();
  const dim=new Date(state.curYear,state.curMonth+1,0).getDate();
  const mName=new Date(state.curYear,state.curMonth).toLocaleDateString('en-US',{month:'long',year:'numeric'});

  let days='';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>days+=`<div class="cal-dname">${d}</div>`);
  for(let i=0;i<firstDow;i++) days+=`<div class="cal-day empty"></div>`;

  for(let d=1;d<=dim;d++){
    const s=ds(state.curYear,state.curMonth,d);
    const past=s<today;
    const wknd=!past&&isWeekend(s);
    const blocked=!past&&isDayBlocked(s);
    const sel=s===state.selectedDate;
    let cls='cal-day';
    if(past||wknd) cls+=' past';
    else if(blocked) cls+=' blocked-day';
    if(s===today) cls+=' today';
    if(sel) cls+=' selected';
    const click=!past&&!wknd&&!blocked?`onclick="pickDate('${s}')"` :'';
    days+=`<div class="${cls}" ${click}>${d}</div>`;
  }

  document.getElementById('content').innerHTML=`
    <p class="section-label">рџ“… choose a date</p>
    <div class="cal-nav">
      <button class="cal-arrow" onclick="prevMo()">вЂ№</button>
      <span class="cal-month">${mName}</span>
      <button class="cal-arrow" onclick="nextMo()">вЂє</button>
    </div>
    <div class="cal-grid">${days}</div>
    ${state.selectedDate?`<div class="nav-row"><span></span><button class="btn-primary" style="width:auto;padding:12px 30px;" onclick="goStep(2)">Next в†’</button></div>`:''}
  `;
}
function prevMo(){if(state.curMonth===0){state.curMonth=11;state.curYear--;}else state.curMonth--;renderStep1();}
function nextMo(){if(state.curMonth===11){state.curMonth=0;state.curYear++;}else state.curMonth++;renderStep1();}
function pickDate(s){state.selectedDate=s;state.selectedTime=null;renderStep1();}

// в”Ђв”Ђ Step 2: Time slots в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderStep2() {
  const sl=slots();
  let grid='';
  sl.forEach(t=>{
    const taken=isTaken(state.selectedDate,t);
    const blocked=isBlocked(state.selectedDate,t);
    const sel=t===state.selectedTime;
    let cls='slot';
    if(taken) cls+=' taken';
    else if(blocked) cls+=' blocked-slot';
    else if(sel) cls+=' selected';
    const inner=taken?`${fmtTime(t)}<br><small>booked</small>`:blocked?`${fmtTime(t)}<br><small>unavail.</small>`:fmtTime(t);
    grid+=`<div class="${cls}" ${!taken&&!blocked?`onclick="pickTime('${t}')"`:''} >${inner}</div>`;
  });

  document.getElementById('content').innerHTML=`
    <p class="section-label">рџ•ђ pick a 30-min slot</p>
    <p style="font-size:.78rem;color:var(--text-sm);margin-bottom:14px;">${fmtDate(state.selectedDate)}</p>
    <div class="time-grid">${grid}</div>
    <div class="nav-row">
      <button class="btn-ghost" onclick="goStep(1)">в†ђ Back</button>
      ${state.selectedTime
        ?`<button class="btn-primary" style="width:auto;padding:12px 30px;" onclick="goStep(3)">Next в†’</button>`
        :`<span style="font-size:.72rem;color:#C9A4BE;">select a slot to continue</span>`}
    </div>
  `;
}
function pickTime(t){state.selectedTime=t;renderStep2();}

// в”Ђв”Ђ Step 3: Details form в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderStep3() {

}

// в”Ђв”Ђ Send verification code в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function sendVerificationCode() {
  const name  = document.getElementById('inp-name').value.trim();
  const phone = document.getElementById('inp-phone').value.trim();
  const email = document.getElementById('inp-email').value.trim();
  const note  = document.getElementById('inp-note').value.trim();

  if(!name)  return showErr('Please enter your name.');
  if(!phone) return showErr('Please enter your phone number.');
  if(!email||!email.includes('@')) return showErr('Please enter a valid email address.');
  if(isTaken(state.selectedDate,state.selectedTime)) return showErr('This slot was just taken! Please go back and choose another time.');

  const btn = document.getElementById('sendCodeBtn');
  btn.textContent = 'вЏі sending...'; btn.disabled = true;

  // Generate 6-digit code
  const code = String(Math.floor(100000 + Math.random() * 900000));
  state.otp        = code;
  state.otpExpiry  = Date.now() + 10 * 60 * 1000; // 10 minutes
  state.resendCooldown = Date.now() + 60 * 1000;   // 60s cooldown
  state.pendingBooking = { name, phone, email, note };

  // Send via EmailJS
  const emailjsReady = CFG.emailjs_public_key !== 'YOUR_PUBLIC_KEY';
  if (emailjsReady) {
    try {
      await emailjs.send(CFG.emailjs_service_id, CFG.emailjs_template_id, {
        to_email: email,
        name:     name,
        code:     code,
      });
    } catch(e) {
      console.error('EmailJS error:', e);
      showErr('Failed to send email. Please check your EmailJS setup and try again.');
      btn.textContent = 'вњ‰ send verification code'; btn.disabled = false;
      return;
    }
  } else {
    // Dev mode: log code to console
    console.log(`%cрџ”‘ DEV MODE вЂ” verification code: ${code}`, 'font-size:1.2rem;color:#D4608A;font-weight:bold;');
  }

  renderVerify(emailjsReady);
}

// в”Ђв”Ђ Verify code screen в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function renderVerify(emailSent=true) {
  const { email } = state.pendingBooking;
  document.getElementById('content').innerHTML=`
    <div class="verify-icon">рџ“¬</div>
    <div class="verify-title">check your inbox</div>

      Enter it below to confirm your booking.
      ${!emailSent ? '<br><span style="color:var(--peach-dk);">(dev mode: check browser console for code)</span>' : ''}
    </p>

    <div class="otp-wrap" id="otpWrap">
      <input class="otp-box" type="number" maxlength="1" id="otp0" oninput="otpInput(this,0)" onkeydown="otpKey(event,0)">
      <input class="otp-box" type="number" maxlength="1" id="otp1" oninput="otpInput(this,1)" onkeydown="otpKey(event,1)">
      <input class="otp-box" type="number" maxlength="1" id="otp2" oninput="otpInput(this,2)" onkeydown="otpKey(event,2)">
      <input class="otp-box" type="number" maxlength="1" id="otp3" oninput="otpInput(this,3)" onkeydown="otpKey(event,3)">
      <input class="otp-box" type="number" maxlength="1" id="otp4" oninput="otpInput(this,4)" onkeydown="otpKey(event,4)">
      <input class="otp-box" type="number" maxlength="1" id="otp5" oninput="otpInput(this,5)" onkeydown="otpKey(event,5)">
    </div>

    <div class="err-box" id="err"></div>
    <button class="btn-primary" id="verifyBtn" onclick="verifyAndBook()" style="margin-top:4px;">вњ¦ confirm booking</button>

    <div class="resend-row">
      Didn't get it? <button class="resend-btn" id="resendBtn" onclick="resendCode()">Resend code</button>
      <span id="resendTimer"></span>
    </div>

    <div class="nav-row">
      <button class="btn-ghost" onclick="renderStep3()">в†ђ Edit details</button>
      <span></span>
    </div>
  `;
  document.getElementById('otp0').focus();
  startResendTimer();
}

// OTP input helpers
function otpInput(el, i) {
  // Only allow single digit
  el.value = el.value.replace(/[^0-9]/g,'').slice(-1);
  el.classList.toggle('filled', el.value !== '');
  if (el.value && i < 5) document.getElementById('otp'+(i+1)).focus();
  // Auto-submit when all filled
  const code = getOtpValue();
  if (code.length === 6) verifyAndBook();
}
function otpKey(e, i) {
  if (e.key === 'Backspace' && !e.target.value && i > 0) {
    document.getElementById('otp'+(i-1)).focus();
  }
}
function getOtpValue() {
  return [0,1,2,3,4,5].map(i => document.getElementById('otp'+i)?.value||'').join('');
}

// Resend countdown timer
function startResendTimer() {
  const btn = document.getElementById('resendBtn');
  const span = document.getElementById('resendTimer');
  if (!btn || !span) return;
  const tick = () => {
    const left = Math.ceil((state.resendCooldown - Date.now()) / 1000);
    if (left > 0) {
      btn.disabled = true;
      span.textContent = ` (${left}s)`;
      setTimeout(tick, 1000);
    } else {
      btn.disabled = false;
      span.textContent = '';
    }
  };
  tick();
}

async function resendCode() {
  if (Date.now() < state.resendCooldown) return;
  const btn = document.getElementById('resendBtn');
  btn.disabled = true; btn.textContent = 'sending...';

  const code = String(Math.floor(100000 + Math.random() * 900000));
  state.otp       = code;
  state.otpExpiry = Date.now() + 10 * 60 * 1000;
  state.resendCooldown = Date.now() + 60 * 1000;

  const emailjsReady = CFG.emailjs_public_key !== 'YOUR_PUBLIC_KEY';
  if (emailjsReady) {
    try {
      await emailjs.send(CFG.emailjs_service_id, CFG.emailjs_template_id, {
        to_email: state.pendingBooking.email,
        name:     state.pendingBooking.name,
        code,
      });
    } catch(e) { console.error(e); }
  } else {
    console.log(`%cрџ”‘ DEV MODE вЂ” new code: ${code}`, 'font-size:1.2rem;color:#D4608A;font-weight:bold;');
  }

  btn.textContent = 'Resend code';
  startResendTimer();
}

// в”Ђв”Ђ Verify + complete booking в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function verifyAndBook() {
  const entered = getOtpValue();
  if (entered.length < 6) return showErr('Please enter the full 6-digit code.');
  if (Date.now() > state.otpExpiry) return showErr('This code has expired. Please request a new one.');
  if (entered !== state.otp) {
    showErr('Incorrect code вЂ” double-check and try again.');
    // Shake the boxes
    document.getElementById('otpWrap').animate([
      {transform:'translateX(-6px)'},{transform:'translateX(6px)'},
      {transform:'translateX(-4px)'},{transform:'translateX(4px)'},
      {transform:'translateX(0)'}
    ], {duration:300,easing:'ease-out'});
    return;
  }

  const btn = document.getElementById('verifyBtn');
  btn.textContent = 'вЏі confirming...'; btn.disabled = true;

  if (isTaken(state.selectedDate, state.selectedTime)) {
    return showErr('Oh no вЂ” this slot was just taken! Please go back and choose another time.');
  }

  const { name, phone, email, note } = state.pendingBooking;
  const b = { id:genId(), name, phone, email, note, date:state.selectedDate, time:state.selectedTime, bookedAt:new Date().toISOString() };
  state.bookings.push(b);
  await saveBookings();
  await notifyOwner(b);
  state.pendingBooking = null;
  state.otp = null;
  renderSuccess(b);
}

function showErr(msg){const el=document.getElementById('err');if(el){el.textContent=msg;el.style.display='block';}}

// в”Ђв”Ђ Google Calendar link в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function calendarLink(b) {
  const [y,mo,d] = b.date.split('-').map(Number);
  const [h,m]    = b.time.split(':').map(Number);
  const pad = n  => String(n).padStart(2,'0');
  const fmt  = (y,mo,d,h,m) => `${y}${pad(mo)}${pad(d)}T${pad(h)}${pad(m)}00`;
  const start = fmt(y,mo,d,h,m);
  // end = start + 30 min
  const endDate = new Date(y,mo-1,d,h,m+30);
  const end = fmt(endDate.getFullYear(), endDate.getMonth()+1, endDate.getDate(), endDate.getHours(), endDate.getMinutes());
  const title = encodeURIComponent(`Meeting with omiku`);
  const details = encodeURIComponent(`Booked via omiku.co/book`);
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${start}/${end}&details=${details}`;
}

// в”Ђв”Ђ Notify owner в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function notifyOwner(b) {
  try {
    await emailjs.send(CFG.emailjs_service_id, CFG.emailjs_notify_id, {
      booker_name:   b.name,
      booker_email:  b.email,
      booker_phone:  b.phone,
      booking_date:  fmtDate(b.date),
      booking_time:  fmtRange(b.time),
      note:          b.note || '(none)',
      calendar_link: calendarLink(b),
    });
  } catch(e) { console.error('Notification email failed:', e); }
}

async function cancelBooking(id){
  if(!confirm('Cancel this booking?'))return;
  state.bookings=state.bookings.filter(b=>b.id!==id);
  await saveBookings(); renderAdmin();
}
async function blockSlot(){
  const date=document.getElementById('bl-date').value;
  const time=document.getElementById('bl-time').value;
  if(!date)return;
  if(state.blocked.some(b=>b.date===date&&b.time===time))return;
  state.blocked.push({date,time});
  await saveBlocked(); renderAdmin();
}
async function unblock(i){
  state.blocked.splice(i,1);
  await saveBlocked(); renderAdmin();
}
function logout(){authed=false;closeModal();}
